name: Deploy Addon

on:
  push:
    branches:
      - master
    paths:
      - 'NoHablas/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get version info
        uses: dotnet/nbgv@master
        id: nbgv

      - name: Prepare addon files
        run: |
          mkdir -p dist/NoHablas
          cp -r NoHablas/* dist/NoHablas/

          TOC=dist/NoHablas/NoHablas.toc

          sed -i "s/^## Version:.*/## Version: ${{ steps.nbgv.outputs.SemVer2 }}/" "$TOC"

      - name: Create addon zip
        run: |
          cd dist
          zip -r ../NoHablas-${{ steps.nbgv.outputs.SemVer2 }}.zip NoHablas

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.nbgv.outputs.SemVer2 }}" \
            --title "NoHablas ${{ steps.nbgv.outputs.SemVer2 }}" \
            --notes "Blocks PGF listings and applicants from LATAM realms." \
            "NoHablas-${{ steps.nbgv.outputs.SemVer2 }}.zip"